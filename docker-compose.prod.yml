# =============================================================================
# Docker Compose — Production deployment (real Azure services)
# Usage: docker compose -f docker-compose.prod.yml up --build -d
#
# Required: create .env with Azure credentials before starting
# =============================================================================

services:
  ai-support-agent:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-customer-support-agent:latest
    container_name: ai-customer-support-agent-prod
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      MOCK_AZURE: "false"
      MOCK_OMS: "${MOCK_OMS:-false}"
      MOCK_COURIER: "${MOCK_COURIER:-false}"
    volumes:
      - app-logs:/app/src/logs
    restart: always
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

volumes:
  app-logs:
